[window]
decorations = "Buttonless"
opacity = 0.75
blur = true
startup_mode = "Maximized"

[font]
size = 14

[window.padding]
x = 10
y = 10

[font.normal]
family = "JetBrainsMono Nerd Font Mono"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"

[font.bold_italic]
family = "JetBrainsMono Nerd Font Mono"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[env]
TERM = "xterm-256color"

[general]

import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

